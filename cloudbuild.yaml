# Cloud Build config for LoLA — automated build + deploy to Cloud Run
#
# Trigger manually:
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_REGION=us-central1,_SERVICE=lola
#
# Or set up a trigger:
#   gcloud builds triggers create github \
#     --repo-name=lola --repo-owner=YOUR_ORG \
#     --branch-pattern="^main$" \
#     --build-config=cloudbuild.yaml

substitutions:
  _REGION: us-central1
  _SERVICE: lola
  _MIN_INSTANCES: "0"
  _MAX_INSTANCES: "3"

steps:
  # Build the container image
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/${_SERVICE}:${SHORT_SHA}"
      - "-t"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/${_SERVICE}:latest"
      - "."

  # Push to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/${_SERVICE}"

  # Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "${_SERVICE}"
      - "--image"
      - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/${_SERVICE}:${SHORT_SHA}"
      - "--platform"
      - "managed"
      - "--region"
      - "${_REGION}"
      - "--allow-unauthenticated"
      - "--port"
      - "8080"
      - "--memory"
      - "1Gi"
      - "--cpu"
      - "1"
      - "--min-instances"
      - "${_MIN_INSTANCES}"
      - "--max-instances"
      - "${_MAX_INSTANCES}"
      - "--timeout"
      - "300"
      - "--concurrency"
      - "80"
      - "--set-env-vars"
      - "DEV_MODE=false,SESSION_TIME_LIMIT=180"
      - "--update-secrets"
      - "GEMINI_API_KEY=GEMINI_API_KEY:latest"

images:
  - "${_REGION}-docker.pkg.dev/${PROJECT_ID}/cloud-run-source-deploy/${_SERVICE}"

options:
  logging: CLOUD_LOGGING_ONLY
